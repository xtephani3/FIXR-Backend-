name: Trigger auto deployment for fixr-backend

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/fixr-backend-AutoDeployTrigger-a30d096d-b10c-49b9-9626-f1f390805811.yml'

  # Allow manual trigger 
  workflow_dispatch:
      
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.FIXRBACKEND_AZURE_CREDENTIALS }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: fixrregistry21744.azurecr.io
          registryUsername: ${{ secrets.FIXRBACKEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.FIXRBACKEND_REGISTRY_PASSWORD }}
          containerAppName: fixr-backend
          resourceGroup: exinta-tria
          imageToBuild: fixrregistry21744.azurecr.io/fixr-backend:${{ github.sha }}
          
            

     

